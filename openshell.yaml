# Deployment configuration — what's enabled for this environment.
#
# Agent YAML files (agents/*.yaml) define which providers each agent
# needs. This file selects defaults and upstream version pins.

providers:
  - github
  - vertex-local
  - atlassian
  - gws

inference:
  model: claude-sonnet-4-6

upstream:
  chart-version: "0.0.59"
