# OpenCode agent configuration.
#
# OpenCode uses ANTHROPIC_BASE_URL with inference.local/v1 (note the /v1 suffix).
# Without /v1, OpenCode sends POST /messages instead of POST /v1/messages,
# which doesn't match the inference route pattern.
#
# Usage:
#   harness apply --agent opencode

name: opencode-agent
entrypoint: opencode
tty: true

providers:
  - profile: github
  - profile: vertex-local
  - profile: atlassian
    env:
      JIRA_URL: ${JIRA_URL}
      JIRA_USERNAME: ${JIRA_USERNAME}
  - profile: gws

env:
  ANTHROPIC_BASE_URL: https://inference.local/v1
  ANTHROPIC_API_KEY: sk-ant-openshell-proxy-managed

payloads:
  - path: /sandbox/opencode.json
    file: profiles/images/sandbox-default/opencode.json
  - path: /sandbox/.mcp.json
    file: profiles/images/sandbox-default/mcp.json
  - path: /etc/openshell/policy.yaml
    file: profiles/images/sandbox-default/policy.yaml
