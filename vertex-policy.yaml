version: 1

filesystem_policy:
  include_workdir: true
  read_only: []
  read_write: [/dev/null]

landlock:
  compatibility: disabled

process:
  run_as_user: sandbox
  run_as_group: sandbox

# Testing policy — wildcard binaries on all endpoints.
# Tighten binary paths before production.
network_policies:
  google_oauth:
    name: google-oauth
    endpoints:
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        request_body_credential_rewrite: true
      - host: "*.google.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        request_body_credential_rewrite: true
    binaries:
      - { path: "/**" }

  google_apis:
    name: google-apis
    endpoints:
      - host: "*.googleapis.com"
        port: 443
    binaries:
      - { path: "/**" }

  claude_downloads:
    name: claude-downloads
    endpoints:
      - host: downloads.claude.ai
        port: 443
    binaries:
      - { path: "/**" }

  anthropic:
    name: anthropic
    endpoints:
      - host: "*.anthropic.com"
        port: 443
    binaries:
      - { path: "/**" }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
      - host: "*.github.com"
        port: 443
      - host: "*.githubusercontent.com"
        port: 443
    binaries:
      - { path: "/**" }

  atlassian:
    name: atlassian
    endpoints:
      - host: "*.atlassian.net"
        port: 443
      - host: "*.atl-paas.net"
        port: 443
      - host: "*.atlassian.com"
        port: 443
    binaries:
      - { path: "/**" }

  packages:
    name: packages
    endpoints:
      - host: registry.npmjs.org
        port: 443
      - host: pypi.org
        port: 443
      - host: "*.pythonhosted.org"
        port: 443
    binaries:
      - { path: "/**" }
